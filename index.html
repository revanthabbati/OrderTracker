<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Widget Tester</title>
    <style>
        /* Base Variables & Reset */
        :root {
            --brand-color: #0f172a;
            --brand-accent: #3b82f6;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            /* Padding to prevent fixed footer overlap */
            padding-bottom: 60px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* =========================================
           VIEW 1: SETUP SCREEN 
           ========================================= */
        #setup-view {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            min-height: calc(100vh - 60px);
            background: linear-gradient(135deg, #e2e8f0 0%, #f8fafc 100%);
            padding: 2rem;
        }

        .setup-card {
            background: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .setup-card h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            color: var(--brand-color);
        }

        .setup-card p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9rem;
            resize: vertical;
            margin-bottom: 1.5rem;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--brand-accent);
        }

        .btn-launch {
            background-color: var(--brand-accent);
            color: white;
            border: none;
            padding: 0.875rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        .btn-launch:hover {
            background-color: #2563eb;
        }

        .btn-launch:active {
            transform: scale(0.98);
        }

        /* =========================================
           VIEW 2: MOCK E-COMMERCE WEBSITE 
           ========================================= */
        #mock-website-view {
            display: none; /* Hidden initially */
            flex-direction: column;
            width: 100%;
        }

        /* Fake Store Header */
        .store-header {
            background-color: var(--brand-color);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .store-logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .store-nav {
            display: flex;
            gap: 2rem;
        }

        .store-nav a {
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .store-nav a.active {
            color: white;
            border-bottom: 2px solid var(--brand-accent);
            padding-bottom: 4px;
        }

        /* Fake Store Content Area */
        .store-main {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
            width: 100%;
        }

        .page-title {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-title h2 {
            font-size: 2rem;
            color: var(--brand-color);
            margin-bottom: 0.5rem;
        }

        .page-title p {
            color: var(--text-muted);
        }

        /* The container where the widget lives */
        .widget-wrapper {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            min-height: 500px;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
            max-width: 900px;
        }

        /* Ensure injected iframe scales properly */
        .widget-wrapper iframe {
            width: 100%;
            min-height: 600px;
            border: none;
        }

        /* Reset Button (Top right of mock site) */
        .btn-reset {
            position: absolute;
            top: 1rem;
            right: 5%;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 0.4rem 1rem;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        
        .btn-reset:hover {
            background: rgba(255,255,255,0.2);
        }

        /* =========================================
           FIXED FOOTER 
           ========================================= */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #ffffff;
            border-top: 1px solid #e2e8f0;
            padding: 1.2rem 0;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            z-index: 1000;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.02);
        }

    </style>
</head>
<body>

    <div id="setup-view">
        <div class="setup-card">
            <h1>Widget Integrator</h1>
            <p>Paste your DT Order Tracker code below to generate a live mock-up of a customer's website.</p>
            <textarea id="widgetInput" placeholder=""></textarea>
            <button id="launchBtn" class="btn-launch">Launch Mock Store</button>
        </div>
    </div>

    <div id="mock-website-view">
        <header class="store-header">
            <div class="store-logo">
                🛍️ Nexus Store
            </div>
            <nav class="store-nav">
                <a href="#">Home</a>
                <a href="#">Shop</a>
                <a href="#" class="active">Track Order</a>
                <a href="#">Support</a>
            </nav>
            <button id="resetBtn" class="btn-reset">Start Over</button>
        </header>

        <main class="store-main">
            <div class="page-title">
                <h2>Track Your Package</h2>
                <p>Enter your order details below to see real-time shipping updates.</p>
            </div>
            
            <div class="widget-wrapper" id="widgetContainer">
                </div>
        </main>
    </div>

    <footer>
        Developed by Revanth Reddy Abbati
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const setupView = document.getElementById('setup-view');
            const mockWebsiteView = document.getElementById('mock-website-view');
            const widgetInput = document.getElementById('widgetInput');
            const widgetContainer = document.getElementById('widgetContainer');
            const launchBtn = document.getElementById('launchBtn');
            const resetBtn = document.getElementById('resetBtn');

            // Switch to Mock Store View
            launchBtn.addEventListener('click', () => {
                const code = widgetInput.value.trim();

                if (!code) {
                    alert('Please paste your tracking widget code first.');
                    return;
                }

                // Inject the code
                widgetContainer.innerHTML = code;

                // Toggle visibility
                setupView.style.display = 'none';
                mockWebsiteView.style.display = 'flex';
            });

            // Switch back to Setup View
            resetBtn.addEventListener('click', () => {
                // Clear the widget to stop any playing scripts/iframes
                widgetContainer.innerHTML = ''; 
                
                // Toggle visibility
                mockWebsiteView.style.display = 'none';
                setupView.style.display = 'flex';
            });
        });
    </script>
</body>
</html>
