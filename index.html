<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DT Tracker Mockup Generator</title>
    <style>
        /* Base Variables & Reset */
        :root {
            --brand-color: #0f172a;
            --brand-accent: #3b82f6;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding-bottom: 60px; /* Space for footer */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* =========================================
           VIEW 1: SETUP SCREEN (Generate URL)
           ========================================= */
        #setup-view {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            min-height: calc(100vh - 60px);
            background: linear-gradient(135deg, #e2e8f0 0%, #f8fafc 100%);
            padding: 2rem;
        }

        .setup-card {
            background: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .setup-card h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            color: var(--brand-color);
        }

        .setup-card p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9rem;
            resize: vertical;
            margin-bottom: 1.5rem;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--brand-accent);
        }

        .btn-primary {
            background-color: var(--brand-accent);
            color: white;
            border: none;
            padding: 0.875rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        .btn-primary:hover {
            background-color: #2563eb;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        /* Generated URL Section */
        #url-result {
            display: none;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e2e8f0;
            text-align: left;
        }

        #url-result label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .url-box {
            display: flex;
            gap: 10px;
        }

        .url-box input {
            flex-grow: 1;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.9rem;
            color: var(--text-muted);
            background: #f8fafc;
        }

        .btn-copy {
            background: var(--brand-color);
            color: white;
            border: none;
            padding: 0 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-copy:hover {
            background: #1e293b;
        }

        /* =========================================
           VIEW 2: MOCK E-COMMERCE WEBSITE 
           ========================================= */
        #mock-website-view {
            display: none;
            flex-direction: column;
            width: 100%;
        }

        /* Fake Store Header */
        .store-header {
            background-color: var(--brand-color);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .store-logo {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .store-nav {
            display: flex;
            gap: 2rem;
        }

        .store-nav a {
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .store-nav a.active {
            color: white;
            border-bottom: 2px solid var(--brand-accent);
            padding-bottom: 4px;
        }

        /* Mobile adjustments for Mock Nav */
        @media (max-width: 600px) {
            .store-nav { display: none; } /* Hide links on mobile to save space */
        }

        /* Fake Store Content Area */
        .store-main {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1.5rem;
            width: 100%;
        }

        .page-title {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-title h2 {
            font-size: 2rem;
            color: var(--brand-color);
            margin-bottom: 0.5rem;
        }

        .page-title p {
            color: var(--text-muted);
        }

        .widget-wrapper {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            min-height: 500px;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
            max-width: 900px;
        }

        .widget-wrapper iframe {
            width: 100%;
            min-height: 600px;
            border: none;
        }

        /* =========================================
           FIXED FOOTER 
           ========================================= */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #ffffff;
            border-top: 1px solid #e2e8f0;
            padding: 1.2rem 0;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="setup-view">
        <div class="setup-card">
            <h1>Create Tracker Link</h1>
            <p>Paste your DT Order Tracker code to generate a shareable mobile testing link.</p>
            <textarea id="widgetInput" placeholder=""></textarea>
            <button id="generateBtn" class="btn-primary">Generate Shareable URL</button>
            
            <div id="url-result">
                <label>Your Testing Link:</label>
                <div class="url-box">
                    <input type="text" id="generatedUrl" readonly>
                    <button class="btn-copy" id="copyBtn">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mock-website-view">
        <header class="store-header">
            <div class="store-logo">🛍️ Nexus Store</div>
            <nav class="store-nav">
                <a href="#">Home</a>
                <a href="#">Shop</a>
                <a href="#" class="active">Track Order</a>
                <a href="#">Support</a>
            </nav>
        </header>

        <main class="store-main">
            <div class="page-title">
                <h2>Track Your Package</h2>
                <p>Enter your tracking details below for real-time updates.</p>
            </div>
            
            <div class="widget-wrapper" id="widgetContainer">
                </div>
        </main>
    </div>

    <footer>
        Developed by Revanth Reddy Abbati
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const setupView = document.getElementById('setup-view');
            const mockWebsiteView = document.getElementById('mock-website-view');
            
            // Check the URL for existing widget code when the page loads
            const urlParams = new URLSearchParams(window.location.search);
            const encodedWidget = urlParams.get('dtcode');

            if (encodedWidget) {
                // If there is code in the URL, we are in "Viewer Mode"
                setupView.style.display = 'none';
                mockWebsiteView.style.display = 'flex';
                
                try {
                    // Decode the Base64 string back into HTML
                    const decodedCode = decodeURIComponent(atob(encodedWidget));
                    document.getElementById('widgetContainer').innerHTML = decodedCode;
                } catch (e) {
                    document.getElementById('widgetContainer').innerHTML = '<p style="text-align:center; color:red;">Error loading widget. The link might be broken.</p>';
                }
            } else {
                // Otherwise, we are in "Generator Mode"
                const generateBtn = document.getElementById('generateBtn');
                const widgetInput = document.getElementById('widgetInput');
                const urlResult = document.getElementById('url-result');
                const generatedUrlInput = document.getElementById('generatedUrl');
                const copyBtn = document.getElementById('copyBtn');

                generateBtn.addEventListener('click', () => {
                    const code = widgetInput.value.trim();
                    if (!code) {
                        alert('Please paste your tracking widget code first.');
                        return;
                    }

                    // Encode the HTML string to Base64 to make it safe for URLs
                    const encodedHTML = btoa(encodeURIComponent(code));
                    
                    // Build the shareable URL
                    const baseUrl = window.location.origin + window.location.pathname;
                    const shareableUrl = `${baseUrl}?dtcode=${encodedHTML}`;
                    
                    generatedUrlInput.value = shareableUrl;
                    urlResult.style.display = 'block';
                });

                copyBtn.addEventListener('click', () => {
                    generatedUrlInput.select();
                    document.execCommand('copy');
                    copyBtn.innerText = 'Copied!';
                    setTimeout(() => copyBtn.innerText = 'Copy', 2000);
                });
            }
        });
    </script>
</body>
</html>
